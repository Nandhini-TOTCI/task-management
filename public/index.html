<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster Pro | Productivity Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .task-card { transition: all 0.2s ease; }
        .task-card:hover { transform: translateY(-2px); shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <i class="fas fa-check-double text-white"></i>
                </div>
                <h1 class="text-xl font-bold text-gray-800 tracking-tight">TaskMaster <span class="text-blue-600">Pro</span></h1>
            </div>
            <div id="status-badge" class="text-sm px-3 py-1 rounded-full bg-green-100 text-green-700 font-medium">
                System Online
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-8">
        <!-- New Task Form -->
        <section class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-8">
            <h2 class="text-lg font-semibold text-gray-800 mb-4 flex items-center">
                <i class="fas fa-plus-circle mr-2 text-blue-500"></i> Create New Task
            </h2>
            <form id="task-form" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-sm font-medium text-gray-600">Task Title</label>
                        <input required type="text" id="title" placeholder="What needs to be done?" 
                               class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                    </div>
                    <div class="space-y-1">
                        <label class="text-sm font-medium text-gray-600">Priority Level</label>
                        <select id="priority" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                            <option value="low">Low Priority</option>
                            <option value="medium" selected>Medium Priority</option>
                            <option value="high">High Priority</option>
                        </select>
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-sm font-medium text-gray-600">Additional Notes (Optional)</label>
                    <textarea id="description" rows="2" placeholder="Describe the task details..." 
                              class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"></textarea>
                </div>
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg shadow-md transition-colors flex items-center justify-center space-x-2 w-full md:w-auto">
                    <i class="fas fa-paper-plane text-sm"></i>
                    <span>Add Task</span>
                </button>
            </form>
        </section>

        <!-- Filters and Stats -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
            <div class="flex items-center space-x-2 overflow-x-auto pb-2 md:pb-0">
                <button onclick="filterTasks('all')" class="filter-btn active bg-blue-100 text-blue-700 px-4 py-1.5 rounded-full text-sm font-medium">All</button>
                <button onclick="filterTasks('pending')" class="filter-btn bg-gray-100 text-gray-600 px-4 py-1.5 rounded-full text-sm font-medium hover:bg-gray-200">Pending</button>
                <button onclick="filterTasks('completed')" class="filter-btn bg-gray-100 text-gray-600 px-4 py-1.5 rounded-full text-sm font-medium hover:bg-gray-200">Completed</button>
            </div>
            <div class="text-sm text-gray-500 italic" id="task-counter">
                Loading dashboard...
            </div>
        </div>

        <!-- Task List Container -->
        <div id="loading" class="flex flex-col items-center justify-center py-20 hidden">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
            <p class="text-gray-500 font-medium">Syncing with server...</p>
        </div>

        <div id="task-list" class="grid grid-cols-1 gap-4">
            <!-- Tasks will be injected here -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 bg-white rounded-xl border-2 border-dashed border-gray-200">
            <div class="text-gray-300 text-6xl mb-4">
                <i class="fas fa-clipboard-list"></i>
            </div>
            <h3 class="text-xl font-medium text-gray-600">No tasks found</h3>
            <p class="text-gray-400">Get started by creating your first task above!</p>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
